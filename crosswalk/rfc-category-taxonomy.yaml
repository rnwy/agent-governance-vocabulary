  wallet_intelligence:        ["RNWY maintainer"]
  reasoning_integrity:        ["ThoughtProof maintainer"]
  compliance_risk:            ["@AlexanderLawson17"]
  passport_grade:             []   # APS, internal — no external review needed
  trust_verification:         ["@haroldmalikfrimpong-ops"]
  security_posture:           ["@kenneives"]
  job_performance:            ["Maiat maintainer"]
  settlement_witness:         ["SAR / defaultverifier.com maintainer"]

