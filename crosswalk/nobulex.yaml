# crosswalk/nobulex.yaml
#
# Maps Nobulex proof-of-behavior primitives to the canonical vocabulary
# defined in vocabulary.yaml v0.1.
#
# Nobulex is a behavioral enforcement layer for AI agents. Agents declare
# behavioral constraints (covenants) using a Cedar-inspired DSL, every
# action is evaluated against those constraints before execution, and
# every decision is recorded in a SHA-256 hash-chained audit trail.
# Cross-agent trust is established via an 8-step verification handshake.
#
# Spec: https://github.com/arian-gogani/nobulex/blob/main/docs/proof-of-behavior-spec.md
# Author: Arian Gogani
# License: MIT (code), CC-BY-4.0 (spec)

system:
  name: Nobulex
  home: https://nobulex.com
  github: https://github.com/arian-gogani/nobulex
  spec: https://github.com/arian-gogani/nobulex/blob/main/docs/proof-of-behavior-spec.md
  spec_version: "Proof-of-Behavior Spec v0.1.0, April 2026"
  role: >
    Behavioral constraint enforcement layer for AI agents. Nobulex defines
    what agents are permitted and forbidden to do via a Cedar-inspired covenant
    DSL, enforces constraints at runtime before each action executes, and
    produces SHA-256 hash-chained audit trails that any verifier can
    independently replay. Cross-agent trust is established via an 8-step
    verification handshake using Ed25519 signatures and W3C DIDs.
  identity_layer: "W3C Decentralized Identifiers (did:nobulex:<hash>), Ed25519 key material"
  license: "MIT (code), CC-BY-4.0 (specification)"

license: MIT
maintainer:
  github: arian-gogani

# ─────────────────────────────────────────────────
# SIGNAL TYPE MAPPINGS
# How Nobulex represents each canonical signal_type from vocabulary.yaml.
# ─────────────────────────────────────────────────
signal_types:

  governance_attestation:
    nobulex_term: "ActionLog"
    nobulex_field: "actionLog.entries[]"
    nobulex_definition: >
      A tamper-evident, SHA-256 hash-chained record of every agent action
      and its enforcement outcome. Each entry contains: index, timestamp,
      agentDid, action, resource, params, outcome (success/failure/blocked),
      previousHash, hash, and optional sourceRefs for derivation lineage.
      The chain is append-only — modifying any entry invalidates all
      subsequent hashes.
    mapping: exact_match
    note: >
      Direct mapping. Nobulex ActionLog entries are the primary governance
      attestation artifact. Each entry is independently verifiable via
      hash chain replay. The evaluator_did equals the agentDid (self-evaluated)
      — Nobulex collapses the actor and enforcer by design. See
      descriptor_dimensions.refusal_authority: self_enforced.
    issuers_in_production: ["Nobulex SDK (@nobulex/sdk)"]
    signed_shapes:
      standard:
        fields: ["index", "timestamp", "agentDid", "action", "resource",
                 "params", "outcome", "previousHash", "hash", "sourceRefs"]
        signing: "SHA-256 hash chain (hash = SHA-256 of index | timestamp | agentDid | action | resource | params | outcome | previousHash)"

  behavioral_trust:
    nobulex_term: "ProofOfBehavior"
    nobulex_field: "proofOfBehavior"
    nobulex_definition: >
      A portable, signed attestation containing: agentDid, didDocument,
      covenant, covenantHash, covenantSignature, actionLog, generatedAt,
      proofSignature, optional audience (aud claim for replay prevention),
      and optional taskClass (scoped behavioral trust). The proof is
      generated by the agent and verified by counterparties via the
      8-step handshake.
    mapping: close_match
    note: >
      behavioral_trust is the closest canonical match. ProofOfBehavior
      is a composite artifact — it bundles identity, constraint declaration,
      compliance evidence, and cryptographic signatures into a single
      verifiable object. The canonical behavioral_trust is a scored
      assessment; Nobulex ProofOfBehavior is binary (trusted/untrusted)
      with granular violation counts rather than a continuous score.

  security_posture:
    nobulex_term: "CovenantSpec"
    nobulex_field: "covenant"
    nobulex_definition: >
      A machine-readable behavioral constraint specification using a
      Cedar-inspired DSL. Contains: name, version, statements (permit/forbid
      with action and conditions), and requirements. The covenant is the
      contract an agent commits to before execution begins. It is hashed
      (SHA-256), signed (Ed25519), and bound to the agent's DID.
    mapping: close_match
    note: >
      security_posture covers artifact/repo/output governance. Nobulex
      CovenantSpec covers runtime behavioral governance — what the agent
      is permitted/forbidden to do during execution. Partially overlapping
      concepts, different enforcement surfaces. CovenantSpec is the
      pre-execution constraint declaration; security_posture is the
      post-evaluation assessment. Both are needed.
    constraint_expressions:
      supported: ["permit", "forbid", "require"]
      evaluation_order: "deny-override (forbid takes precedence over permit)"
      condition_operators: [">", "<", ">=", "<=", "==", "!="]

  trust_verification:
    nobulex_term: "HandshakeResult"
    nobulex_field: "handshakeResult"
    nobulex_definition: >
      The output of the 8-step cross-agent verification handshake.
      Contains: trusted (boolean), agentDid, covenantName, signatureValid,
      logIntegrityValid, compliant, violationCount, totalActions, reason,
      verification (full VerificationResult), and verifiedAt timestamp.
    mapping: close_match
    note: >
      trust_verification covers identity verification status. Nobulex
      HandshakeResult covers behavioral verification status — not just
      "is this agent who they claim to be" but "has this agent behaved
      according to its declared constraints." Identity is verified as
      Step 1-2 (Ed25519 signature checks); behavior is verified Steps 3-8.

  passport_grade:
    nobulex_term: null
    mapping: no_mapping
    note: >
      Nobulex does not issue composite trust grades. Trust is binary
      (HandshakeResult.trusted = true/false) with granular violation
      counts. No scored assessment — the verifier decides their own
      threshold via HandshakeOptions (minActions, maxViolations,
      requiredCovenant, expectedAudience, requiredTaskClass).

  wallet_state:
    nobulex_term: null
    mapping: no_mapping
    note: >
      Nobulex has no on-chain wallet integration. Agent identity is
      DID-based (did:nobulex:<hash>), not wallet-based. Out of scope
      for the behavioral enforcement layer.

  wallet_intelligence:
    nobulex_term: null
    mapping: no_mapping
    note: >
      No wallet-pattern analysis. Nobulex operates at the action/behavior
      layer, not the financial layer. Out of scope.

  reasoning_integrity:
    nobulex_term: null
    mapping: no_mapping
    note: >
      Nobulex does not attest to model-level reasoning quality. It verifies
      behavioral compliance (did the agent follow its rules?), not reasoning
      quality (did the agent think well?). Distinct governance surfaces.

  compliance_risk:
    nobulex_term: null
    mapping: no_mapping
    note: >
      Nobulex does not produce scored compliance risk assessments. It
      produces binary compliance results — compliant or not, with specific
      violations listed. A downstream system could compute a risk score
      from Nobulex violation history, but Nobulex itself does not.

  job_performance:
    nobulex_term: null
    mapping: no_mapping
    note: >
      Nobulex does not assess task completion quality. It verifies
      whether the agent followed its behavioral constraints during
      execution, not whether the output was good. Complementary to
      systems like Logpose that attest to task completion.

  settlement_witness:
    nobulex_term: null
    mapping: no_mapping
    note: >
      Nobulex does not produce outcome attestations bound to financial
      settlements. The action log records what happened, but does not
      bind to payment or escrow release. Out of scope.

# ─────────────────────────────────────────────────
# VERIFICATION PATTERN
# The 8-step cross-agent verification handshake.
# Novel relative to other landed crosswalks which verify single envelopes.
# ─────────────────────────────────────────────────
verification_pattern:
  name: "Proof-of-Behavior Handshake"
  steps:
    - step: 1
      name: "Covenant signature verification"
      description: >
        Verify that the covenant hash matches the declared covenant
        and that the Ed25519 signature was produced by the agent's DID.
      failure_mode: "Covenant signature is invalid — agent did not commit to these rules"

    - step: 2
      name: "Proof signature verification"
      description: >
        Verify the Ed25519 signature over the full proof payload
        (agentDid, covenantHash, covenantSignature, generatedAt,
        audience, taskClass). Detects tampering of any proof field.
      failure_mode: "Proof signature is invalid — proof may have been tampered with"

    - step: 3
      name: "Action log integrity"
      description: >
        Replay the SHA-256 hash chain. Each entry's hash must equal
        SHA-256(entry fields | previousHash). Break in chain = tampering.
      failure_mode: "Action log integrity failed — hash chain is broken"

    - step: 4
      name: "Covenant compliance"
      description: >
        Replay every action log entry against the declared covenant.
        Each entry is evaluated against permit/forbid statements.
        Violations counted.
      failure_mode: "Agent has N violations (max: M)"

    - step: 5
      name: "Minimum action history"
      description: >
        Verify the agent has enough history to be trustworthy.
        Configurable via HandshakeOptions.minActions.
      failure_mode: "Agent has N actions (minimum required: M)"

    - step: 6
      name: "Required covenant"
      description: >
        Verify the agent committed to the specific covenant required
        by the verifier. Configurable via HandshakeOptions.requiredCovenant.
      failure_mode: "Covenant 'X' does not match required 'Y'"

    - step: 7
      name: "Audience binding"
      description: >
        Verify the proof's audience claim matches the verifier's DID.
        Prevents replay attacks where a proof meant for Agent A is
        presented to Agent B. Added per RFC #1740 feedback.
      failure_mode: "Proof audience does not match expected audience"

    - step: 8
      name: "Task class scoping"
      description: >
        Verify the proof covers the specific task class required by
        the verifier. An agent trusted for data_read is not automatically
        trusted for payment_execution. Configurable via
        HandshakeOptions.requiredTaskClass.
      failure_mode: "Proof task class does not match required task class"

  composite_result:
    output: "HandshakeResult"
    trust_model: "Binary (trusted: true/false) with granular violation evidence"
    replay_capability: "full_replay — any verifier can independently replay all 8 steps"

# ─────────────────────────────────────────────────
# DESCRIPTOR DIMENSIONS
# How Nobulex maps to each canonical descriptor dimension.
# ─────────────────────────────────────────────────
descriptor_dimensions:
  enforcement_class: "binding"
  note_enforcement: >
    Nobulex enforcement is binding and produces refusals. Forbidden
    actions are blocked before execution (outcome: 'blocked'). Not
    advisory — the middleware prevents the action from running.

  validity_temporal: "continuously"
  note_validity: >
    Constraints are evaluated continuously on every action, not at
    a single point in time. The hash chain provides continuous validity
    evidence across the full session lifetime.

  refusal_authority: "self_enforced"
  note_refusal: >
    Nobulex collapses the actor and enforcer by design. The agent
    evaluates its own actions against its own declared covenant.
    evaluator_did === agentDid. This is a legitimate architectural
    choice — the enforcement is structural (middleware intercepts
    every action), not behavioral (agent choosing to comply).

  invariant_survival: "permanent"
  note_invariant: >
    The hash chain is append-only and permanent. Once an action is
    logged, it cannot be removed or modified without breaking the
    chain. The invariant survives past the action lifecycle.

  replay_class: "full_replay"
  note_replay: >
    Any verifier with the action log and covenant can independently
    replay every enforcement decision. Deterministic — same inputs
    always produce the same compliance verdict.

  governed_action_class: ["read", "write", "transfer", "delegate", "publish", "compose"]
  note_governed: >
    Nobulex governs arbitrary action types defined in the covenant DSL.
    All canonical action classes can be expressed as covenant statements.
    Example: 'forbid transfer (amount > 1000)' governs transfer actions
    with conditions.

# ─────────────────────────────────────────────────
# IDENTITY METHOD
# How Nobulex implements agent identity.
# ─────────────────────────────────────────────────
identity:
  method: "did:nobulex"
  derivation: >
    did:nobulex:<SHA-256 hash of Ed25519 public key>. The DID is
    deterministically derived from the agent's Ed25519 key material.
    Key pair generated via @noble/ed25519 CSPRNG. DID Document follows
    W3C DID Core v1.0 with Ed25519VerificationKey2020 suite.
  key_material: "Ed25519 (32-byte private key, 32-byte public key)"
  signing: "Ed25519 detached signatures via @noble/ed25519"
  did_document_fields: ["@context", "id", "controller", "verificationMethod",
                        "authentication", "assertionMethod", "created", "updated"]

# ─────────────────────────────────────────────────
# DERIVATION LINEAGE (sourceRefs)
# How Nobulex tracks cross-agent data provenance.
# Added per Aman Sharma's governance composition feedback.
# ─────────────────────────────────────────────────
derivation_lineage:
  field: "actionLogEntry.sourceRefs[]"
  definition: >
    Optional array of SourceRef objects on each ActionLogEntry. Each
    SourceRef points to an upstream agent's log entry whose output
    informed the current action. Enables governance composition rules:
    max sensitivity, intersect access control, union regulatory tags.
  source_ref_fields: ["agentDid", "entryHash", "governanceTags"]
  composition_note: >
    Governance tags propagate through the derivation chain. When an
    action derives from multiple sources with different governance
    requirements, the most restrictive governance applies (monotonicity
    constraint per Aman Sharma's composition semantics).
